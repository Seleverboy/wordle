    <style>
        :root {
            --bg: #e0e5ec;
            --shadow-dark: #bebebe;
            --shadow-light: #ffffff;
            --tile-radius: 16px;
            --key-radius: 14px;
            --btn-radius: 20px;
            --tile-correct-bg: #2d2d2d;
            --tile-correct-text: #ffffff;
            --tile-correct-shadow-dark: #1a1a1a;
            --tile-correct-shadow-light: #4a4a4a;
            --tile-misplaced-bg: #7a7a7a;
            --tile-misplaced-text: #ffffff;
            --tile-misplaced-shadow-dark: #5a5a5a;
            --tile-misplaced-shadow-light: #9a9a9a;
            --tile-absent-bg: #c8c8c8;
            --tile-absent-text: #333333;
            --tile-absent-shadow-dark: #a8a8a8;
            --tile-absent-shadow-light: #e8e8e8;
            --key-unused-bg: var(--bg);
            --key-unused-text: #333333;
            --key-correct-bg: #2d2d2d;
            --key-correct-text: #ffffff;
            --key-correct-shadow-dark: #1a1a1a;
            --key-correct-shadow-light: #4a4a4a;
            --key-misplaced-bg: #7a7a7a;
            --key-misplaced-text: #ffffff;
            --key-misplaced-shadow-dark: #5a5a5a;
            --key-misplaced-shadow-light: #9a9a9a;
            --key-absent-bg: #c8c8c8;
            --key-absent-text: #333333;
            --key-absent-shadow-dark: #a8a8a8;
            --key-absent-shadow-light: #e8e8e8;
            --toast-bg: #2d2d2d;
            --toast-text: #ffffff;
            --tile-size: 58px;
            --tile-gap: 8px;
            --key-height: 52px;
            --key-gap: 6px;
            --font-main: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: var(--bg);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding: 0 12px;
            overflow-y: auto;
        }
        .header {
            text-align: center; padding: 28px 0 18px; width: 100%; max-width: 500px;
            display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 8px;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .title {
            font-size: 28px; font-weight: 700; letter-spacing: 8px; color: #2d2d2d; text-transform: uppercase;
            text-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
        }
        .subtitle {
            font-size: 11px; font-weight: 400; color: #777; letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 1px 1px 2px var(--shadow-dark), -1px -1px 2px var(--shadow-light);
        }
        .new-game-btn, .hint-btn {
            background: var(--bg); border: none; color: #444; padding: 10px 18px;
            border-radius: var(--btn-radius); cursor: pointer; font-size: 12px; font-weight: 600;
            letter-spacing: 1px; font-family: var(--font-main);
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            transition: all 0.2s ease; white-space: nowrap;
        }
        .new-game-btn:hover, .hint-btn:hover:not(:disabled) {
            box-shadow: 3px 3px 7px var(--shadow-dark), -3px -3px 7px var(--shadow-light);
            color: #222; transform: translateY(-1px);
        }
        .new-game-btn:active, .hint-btn:active:not(:disabled) {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            color: #555; transform: translateY(1px);
        }
        .hint-btn:disabled { opacity: 0.5; cursor: default; pointer-events: none; }
        .game-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; flex-grow: 1; justify-content: center; gap: 16px; }
        .board { display: grid; grid-template-rows: repeat(6, var(--tile-size)); grid-template-columns: repeat(5, var(--tile-size)); gap: var(--tile-gap); justify-content: center; padding: 10px 0; }
        .tile {
            width: var(--tile-size); height: var(--tile-size); background: var(--bg); border: none;
            border-radius: var(--tile-radius); display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 700; color: #2d2d2d; text-transform: uppercase;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: box-shadow 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }
        .tile.correct { background: var(--tile-correct-bg); color: var(--tile-correct-text); box-shadow: inset 5px 5px 10px var(--tile-correct-shadow-dark), inset -5px -5px 10px var(--tile-correct-shadow-light); animation: revealTile 0.45s ease; }
        .tile.misplaced { background: var(--tile-misplaced-bg); color: var(--tile-misplaced-text); box-shadow: inset 5px 5px 10px var(--tile-misplaced-shadow-dark), inset -5px -5px 10px var(--tile-misplaced-shadow-light); animation: revealTile 0.45s ease; }
        .tile.absent { background: var(--tile-absent-bg); color: var(--tile-absent-text); box-shadow: inset 5px 5px 10px var(--tile-absent-shadow-dark), inset -5px -5px 10px var(--tile-absent-shadow-light); animation: revealTile 0.45s ease; }
        .tile.shake { animation: shakeTile 0.5s ease; }
        .tile.win-bounce { animation: winBounce 0.6s ease; }
        @keyframes revealTile {
            0% { transform: rotateX(0deg); background: var(--bg); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }
            40% { transform: rotateX(90deg); background: var(--bg); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }
            55% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
        @keyframes shakeTile { 0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)} }
        @keyframes winBounce { 0%{transform:translateY(0)}20%{transform:translateY(-18px)}35%{transform:translateY(4px)}50%{transform:translateY(-8px)}65%{transform:translateY(2px)}80%{transform:translateY(-3px)}100%{transform:translateY(0)} }
        .toast-container { position:fixed; top:90px; left:50%; transform:translateX(-50%); z-index:100; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:8px; }
        .toast {
            background:var(--toast-bg); color:var(--toast-text); padding:12px 28px; border-radius:28px;
            font-size:14px; font-weight:600; letter-spacing:0.5px; opacity:0; transform:translateY(-20px);
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1); pointer-events:none;
            box-shadow:6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); white-space:nowrap;
        }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast.hide { opacity:0; transform:translateY(-20px); }
        .keyboard { display:flex; flex-direction:column; align-items:center; gap:var(--key-gap); width:100%; max-width:520px; padding:12px 0 24px; }
        .keyboard-row { display:flex; gap:var(--key-gap); width:100%; justify-content:center; }
        .key {
            height:var(--key-height); min-width:32px; flex:1; max-width:44px; border-radius:var(--key-radius);
            border:none; background:var(--key-unused-bg); color:var(--key-unused-text); font-size:14px;
            font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center;
            text-transform:uppercase; letter-spacing:0.5px;
            box-shadow:5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            transition:all 0.15s ease; font-family:var(--font-main);
            -webkit-tap-highlight-color:transparent; touch-action:manipulation;
        }
        .key:hover { box-shadow:3px 3px 7px var(--shadow-dark), -3px -3px 7px var(--shadow-light); transform:translateY(-1px); }
        .key:active { box-shadow:inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); transform:scale(0.97); }
        .key.wide { flex:1.6; max-width:68px; font-size:12px; letter-spacing:1px; }
        .key.wide .delete-icon { width:24px; height:24px; display:block; margin:0 auto; pointer-events:none; }
        .key.correct { background:var(--key-correct-bg); color:var(--key-correct-text); box-shadow:inset 4px 4px 8px var(--key-correct-shadow-dark), inset -4px -4px 8px var(--key-correct-shadow-light); }
        .key.misplaced { background:var(--key-misplaced-bg); color:var(--key-misplaced-text); box-shadow:inset 4px 4px 8px var(--key-misplaced-shadow-dark), inset -4px -4px 8px var(--key-misplaced-shadow-light); }
        .key.absent { background:var(--key-absent-bg); color:var(--key-absent-text); box-shadow:inset 4px 4px 8px var(--key-absent-shadow-dark), inset -4px -4px 8px var(--key-absent-shadow-light); }
        .message-area { text-align:center; min-height:28px; font-size:13px; color:#666; letter-spacing:0.5px; padding:4px 0; transition:all 0.3s ease; text-shadow:1px 1px 2px var(--shadow-light), -1px -1px 2px var(--shadow-dark); }
        .message-area.win { color:#2d2d2d; font-weight:600; font-size:15px; }
        .message-area.loss { color:#555; font-weight:500; font-size:14px; }
        .message-area .answer-reveal {
            font-weight:700; text-transform:uppercase; letter-spacing:3px; color:#1a1a1a; background:var(--bg);
            padding:2px 10px; border-radius:6px; box-shadow:inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
            margin-left:4px;
        }
        @media (max-width: 480px) {
            :root { --tile-size: 50px; --tile-gap: 6px; --key-height: 44px; --key-gap: 4px; --tile-radius: 14px; --key-radius: 12px; }
            .tile { font-size: 22px; }
            .key { font-size: 11px; min-width: 26px; max-width: 36px; }
            .key.wide { max-width: 54px; font-size: 10px; }
            .key.wide .delete-icon { width: 20px; height: 20px; }
            .title { font-size: 22px; letter-spacing: 5px; }
            .header { padding: 18px 0 12px; margin-bottom: 4px; }
            .new-game-btn, .hint-btn { font-size: 10px; padding: 8px 12px; }
            .board { padding: 6px 0; }
            .toast { font-size: 12px; padding: 10px 22px; }
        }
        @media (max-width: 360px) {
            :root { --tile-size: 42px; --tile-gap: 4px; --key-height: 38px; --key-gap: 3px; --tile-radius: 12px; --key-radius: 10px; }
            .tile { font-size: 18px; }
            .key { font-size: 10px; min-width: 22px; max-width: 30px; }
            .key.wide { max-width: 46px; font-size: 9px; }
            .key.wide .delete-icon { width: 18px; height: 18px; }
            .title { font-size: 19px; letter-spacing: 4px; }
            .new-game-btn, .hint-btn { font-size: 9px; padding: 6px 10px; }
        }
    </style>

                const pool = messages[guessCount];
                if (!pool) return "You won!";

            }

            function updateMessageArea() {
                messageArea.classList.remove('win','loss'); messageArea.innerHTML = '';
                if (state.gameStatus === 'won') { messageArea.classList.add('win'); messageArea.textContent = getWinMessage(state.currentRow + 1); }
                else if (state.gameStatus === 'lost') { messageArea.classList.add('loss'); messageArea.innerHTML = `The answer was <span class="answer-reveal">${state.targetWord}</span>`; }
            }

            // ── TOAST ──────────────────────────────
            function showToast(message, duration = 1800) {
                const toast = document.createElement('div'); toast.classList.add('toast'); toast.textContent = message;
                toastContainer.appendChild(toast);
                requestAnimationFrame(() => toast.classList.add('show'));
                setTimeout(() => { toast.classList.add('hide'); toast.addEventListener('transitionend', () => toast.remove()); }, duration);
            }

            // ── HINT LOGIC ─────────────────────────
            function isRowComplete() { return getCurrentGuessPadded() === state.targetWord; }
            function updateHintButton() {
                const remaining = 3 - state.hintsUsed; hintCountSpan.textContent = remaining;
                hintBtn.disabled = remaining <= 0 || state.gameStatus !== 'playing' || isRowComplete();
            }
            function giveHint() {
                if (state.gameStatus !== 'playing' || state.isRevealing) return;
                if (state.hintsUsed >= 3) return showToast('No hints remaining');
                const padded = getCurrentGuessPadded(), target = state.targetWord;
                const eligible = [];
                for (let i = 0; i < 5; i++) if (padded[i] !== target[i]) eligible.push(i);
                if (eligible.length === 0) return showToast('Word already complete');
                const pos = eligible[Math.floor(Math.random() * eligible.length)];
                let arr = padded.split(''); arr[pos] = target[pos];
                state.guesses[state.currentRow] = arr.join('').trimEnd();
                updateTileDisplay(state.currentRow, pos, target[pos]);
                state.hintsUsed++; syncCurrentTile(); updateHintButton();
            }

            // ── GAME LOGIC ─────────────────────────
            function getFeedback(guess, target) {
                const res = Array(5).fill('absent');
                const tl = target.split(''), gl = guess.split('');
                const tu = Array(5).fill(false), gu = Array(5).fill(false);
                for (let i = 0; i < 5; i++) if (gl[i] === tl[i]) { res[i] = 'correct'; tu[i] = gu[i] = true; }
                for (let i = 0; i < 5; i++) {
                    if (gu[i]) continue;
                    for (let j = 0; j < 5; j++) if (!tu[j] && gl[i] === tl[j]) { res[i] = 'misplaced'; tu[j] = true; break; }
                }
                return res;
            }
            function updateKeyboardState(guess, feedback) {
                for (let i = 0; i < 5; i++) {
                    const l = guess[i], fb = feedback[i], cur = state.keyboardStates[l];
                    if (fb === 'correct') state.keyboardStates[l] = 'correct';
                    else if (fb === 'misplaced' && cur !== 'correct') state.keyboardStates[l] = 'misplaced';
                    else if (fb === 'absent' && !cur) state.keyboardStates[l] = 'absent';
                }
                updateKeyboardVisuals();
            }
            function applyFeedbackToRow(row, feedback, cb) {
                const tiles = getAllTilesInRow(row);
                tiles.forEach((t, i) => setTimeout(() => t.classList.add(feedback[i]), i * 350));
                setTimeout(cb, 5 * 350 + 200);
            }
            function shakeRow(row) {
                getAllTilesInRow(row).forEach(t => { t.classList.add('shake'); t.addEventListener('animationend', function h() { t.classList.remove('shake'); t.removeEventListener('animationend', h); }); });
            }
            function winBounceRow(row) {
                getAllTilesInRow(row).forEach((t, i) => setTimeout(() => { t.classList.add('win-bounce'); t.addEventListener('animationend', function h() { t.classList.remove('win-bounce'); t.removeEventListener('animationend', h); }); }, i * 80));
            }

            function submitGuess() {
                if (state.gameStatus !== 'playing' || state.isRevealing) return;
                syncCurrentTile();
                if (state.currentTile < 5) { showToast('Not enough letters'); shakeRow(state.currentRow); return; }
                const guess = state.guesses[state.currentRow];
                if (!guess || guess.length !== 5) return;
                if (!validWordsSet.has(guess)) { showToast('Not in word list'); shakeRow(state.currentRow); return; }
                state.isRevealing = true;
                const feedback = getFeedback(guess, state.targetWord);
                applyFeedbackToRow(state.currentRow, feedback, () => {
                    updateKeyboardState(guess, feedback);
                    state.isRevealing = false;
                    if (guess === state.targetWord) {
                        state.gameStatus = 'won';
                        updateMessageArea();
                        winBounceRow(state.currentRow);
                        updateHintButton();
                        return;
                    }
                    if (state.currentRow >= 5) {
                        state.gameStatus = 'lost';
                        updateMessageArea();
                        updateHintButton();
                        return;
                    }
                    state.currentRow++;
                    state.currentTile = 0;
                    syncCurrentTile();
                });
            }

            function addLetter(letter) {
                if (state.gameStatus !== 'playing' || state.isRevealing) return;
                const l = letter.toLowerCase();
                if (!/^[a-z]$/.test(l)) return;
                syncCurrentTile();
                if (state.currentTile >= 5) return;
                const pos = state.currentTile;
                let arr = getCurrentGuessPadded().split(''); arr[pos] = l;
                state.guesses[state.currentRow] = arr.join('').trimEnd();
                updateTileDisplay(state.currentRow, pos, l);
                syncCurrentTile();
            }

            function removeLetter() {
                if (state.gameStatus !== 'playing' || state.isRevealing) return;
                const arr = getCurrentGuessPadded().split('');
                for (let i = 4; i >= 0; i--) if (arr[i] !== ' ') {
                    arr[i] = ' ';
                    state.guesses[state.currentRow] = arr.join('').trimEnd();
                    updateTileDisplay(state.currentRow, i, '');
                    syncCurrentTile();
                    return;
                }
            }

            function handleVirtualKeyPress(keyLabel) {
                if (state.gameStatus !== 'playing' && keyLabel !== 'enter') return;
                if (state.isRevealing) return;
                if (keyLabel === 'enter') submitGuess();
                else if (keyLabel === 'backspace') removeLetter();
                else if (/^[a-z]$/.test(keyLabel)) addLetter(keyLabel);
            }

            function handlePhysicalKeyPress(e) {
                if (state.gameStatus !== 'playing' || state.isRevealing) return;
                if (e.key === 'Enter') { e.preventDefault(); submitGuess(); }
                else if (e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); removeLetter(); }
                else if (/^[a-zA-Z]$/.test(e.key) && e.key.length === 1) { e.preventDefault(); addLetter(e.key); }
            }

            function initGame() {
                resetState();
                buildBoard();
                buildKeyboard();
                updateMessageArea();
                state.guesses = Array(6).fill('');
                for (let row = 0; row < 6; row++) for (let col = 0; col < 5; col++) {
                    const tile = getTile(row, col);
                    if (tile) tile.classList.remove('correct','misplaced','absent','filled','shake','win-bounce');
                }
                state.keyboardStates = {};
                keyboardEl.querySelectorAll('.key').forEach(k => k.classList.remove('correct','misplaced','absent'));
                updateKeyboardVisuals();
                updateHintButton();
                syncCurrentTile();
            }

            function resetState() {
                state.targetWord = pickTargetWord();
                state.currentRow = 0; state.currentTile = 0; state.guesses = [];
                state.gameStatus = 'playing'; state.isRevealing = false;
                state.keyboardStates = {}; state.hintsUsed = 0;
            }

            function pickTargetWord() { return targetWords[Math.floor(Math.random() * targetWords.length)]; }
            function newGame() { initGame(); showToast('New game started', 1200); }

            // ── EVENT LISTENERS ────────────────────
            document.addEventListener('keydown', handlePhysicalKeyPress);
            newGameBtn.addEventListener('click', newGame);
            hintBtn.addEventListener('click', giveHint);
            keyboardEl.addEventListener('touchstart', e => { if (e.target.closest('.key')) e.preventDefault(); }, { passive: false });

            // ── START THE GAME ────────────────────
            initGame();
            console.log('Wordle ready. Target:', state.targetWord.toUpperCase());
        })();
    </script>
